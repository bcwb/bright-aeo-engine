<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Left face - Orange -->
  <polygon points="5,90 50,10 50,90" fill="#E39400"/>
  <!-- Right face - Blue -->
  <polygon points="50,10 95,90 50,90" fill="#009FC7"/>
  <!-- Inner depth shadow -->
