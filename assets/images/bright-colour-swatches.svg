<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140" font-family="Arial, Calibri, sans-serif">

  <!-- Navy -->
  <rect x="10" y="10" width="110" height="70" rx="6" fill="#0F2B3D"/>
  <text x="65" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#0F2B3D">Navy</text>
  <text x="65" y="114" text-anchor="middle" font-size="11" fill="#555">#0F2B3D</text>
  <text x="65" y="130" text-anchor="middle" font-size="10" fill="#777">Primary</text>

  <!-- Blue -->
  <rect x="135" y="10" width="110" height="70" rx="6" fill="#009FC7"/>
  <text x="190" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#009FC7">Blue</text>
  <text x="190" y="114" text-anchor="middle" font-size="11" fill="#555">#009FC7</text>
  <text x="190" y="130" text-anchor="middle" font-size="10" fill="#777">Accent / CTA</text>

  <!-- Orange -->
  <rect x="260" y="10" width="110" height="70" rx="6" fill="#E39400"/>
  <text x="315" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#E39400">Orange</text>
  <text x="315" y="114" text-anchor="middle" font-size="11" fill="#555">#E39400</text>
  <text x="315" y="130" text-anchor="middle" font-size="10" fill="#777">Secondary Accent</text>

  <!-- Yellow -->
  <rect x="385" y="10" width="110" height="70" rx="6" fill="#E6D600" stroke="#d4c500" stroke-width="1"/>
  <text x="440" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#B8AC00">Yellow</text>
  <text x="440" y="114" text-anchor="middle" font-size="11" fill="#555">#E6D600</text>
  <text x="440" y="130" text-anchor="middle" font-size="10" fill="#777">Tertiary Accent</text>

</svg>
